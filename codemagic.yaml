workflows:
  android-release:
    name: Android APK Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      # Si tu ajoutes un keystore Android dans Codemagic, active ceci
      # avec le vrai Reference name du keystore :
      # android_signing:
      #   - gestia_android_keystore
    scripts:
      - name: Check required environment variables
        script: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL in Codemagic variables."
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_ANON_KEY in Codemagic variables."
            exit 1
          fi
      - name: Install dependencies
        script: flutter pub get
      - name: Build Android APK
        script: >
          flutter build apk --release
          --dart-define=SUPABASE_URL="$SUPABASE_URL"
          --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  web-release:
    name: Web Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
    scripts:
      - name: Check required environment variables
        script: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL in Codemagic variables."
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_ANON_KEY in Codemagic variables."
            exit 1
          fi
      - name: Install dependencies
        script: flutter pub get
      - name: Build Web
        script: >
          flutter build web --release
          --dart-define=SUPABASE_URL="$SUPABASE_URL"
          --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
    artifacts:
      - build/web/**
